name: Refresh offers (monthly)

# Keeps data/offers_current.json current. An agent (Claude Haiku — cheap, sufficient
# for structured extraction) researches the live market and proposes updates as a PR
# — NEVER auto-merged; a human (the grounded expert) reviews. Requires repo secret
# ANTHROPIC_API_KEY; without it, the job still runs the freshness check and alerts.

on:
  schedule:
    - cron: "0 6 1 * *"   # 1st of each month, 06:00 UTC (floating rates reset monthly)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt

      # 1. Freshness signal on the CURRENT data (informational; opens nothing).
      - name: Check freshness of current data
        run: python scripts/validate_offers.py data/offers_current.json --check-stale --max-age-days 35
        continue-on-error: true

      # 2. Agent researches the market and rewrites data/offers_current.json.
      #    Uses Claude Code in headless (-p) mode — built for non-interactive
      #    automation. Skipped automatically if no API key is configured.
      - uses: actions/setup-node@v4
        if: env.HAS_KEY == 'true'
        with:
          node-version: "20"
      - name: Install Claude Code
        if: env.HAS_KEY == 'true'
        run: npm install -g @anthropic-ai/claude-code
      - name: Agent — refresh offers
        if: env.HAS_KEY == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Read .github/refresh-prompt.md and follow it exactly. Update data/offers_current.json in place and set meta.last_verified to today's date (UTC)." \
            --model claude-haiku-4-5-20251001 \
            --allowed-tools "Read" "WebSearch" "WebFetch" "Edit" "Write" \
            --permission-mode acceptEdits \
            --max-turns 40

      # 3. GATE — the agent's output must pass schema + full test suite before a PR.
      - name: Validate refreshed data (gate)
        if: env.HAS_KEY == 'true'
        run: |
          python scripts/validate_offers.py data/offers_current.json
          pytest -q

      # 3b. Append a dated snapshot to the price-history time series.
      - name: Append snapshot to history
        if: env.HAS_KEY == 'true'
        run: |
          python - <<'PY'
          import json
          d = json.load(open("data/offers_current.json", encoding="utf-8"))
          snap = {"snapshot": d["meta"]["last_verified"], "offers": d["offers"]}
          with open("data/offers_history.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(snap, ensure_ascii=False) + "\n")
          PY

      # 4. Open a PR for human review (only if data actually changed).
      - name: Open PR
        if: env.HAS_KEY == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-offers
          title: "Monthly offer refresh"
          commit-message: "Refresh current offers from the market"
          labels: data, needs-human-review
          body: |
            Automated monthly refresh of `data/offers_current.json` (agent-proposed via Claude Haiku, **not** auto-merged).

            Review against the source URLs before merging. Confirm:
            - every previously-active supplier is still present (or its removal is explained),
            - rates carry a `source` + `date`,
            - no rate was invented.

      - name: Note when agent is not configured
        if: env.HAS_KEY != 'true'
        run: echo "ANTHROPIC_API_KEY not set — ran freshness check only. Add the secret to enable the agentic refresh + PR."
